<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow | Secure Access</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-highlight: rgba(255, 255, 255, 0.25);
        }

        body { 
            background-color: #020617; 
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 3D Animated Blobs */
        .blob-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            /* Reduced blur so the blobs and their 3D gradients show more clearly */
            filter: blur(5px);
            opacity: 1.7;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            width: 45vw;
            height: 45vw;
            min-width: 300px;
            min-height: 300px;
            background: radial-gradient(circle at 30% 30%, #34d399, #10b981, #064e3b);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .blob-2 {
            width: 40vw;
            height: 40vw;
            min-width: 250px;
            min-height: 250px;
            background: radial-gradient(circle at 70% 30%, #818cf8, #4f46e5, #312e81);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
            animation-duration: 22s;
        }

        .blob-3 {
            width: 30vw;
            height: 30vw;
            min-width: 200px;
            min-height: 200px;
            background: radial-gradient(circle at 50% 50%, #c084fc, #9333ea, #4c1d95);
            top: 40%;
            left: 40%;
            animation-delay: -10s;
            animation-duration: 28s;
            opacity: 0.5;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(15%, 10%) scale(1.1) rotate(45deg); }
            66% { transform: translate(-10%, 20%) scale(0.9) rotate(90deg); }
            100% { transform: translate(10%, -15%) scale(1.2) rotate(135deg); }
        }

        /* Glassmorphism Card with entrance animation */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-border-highlight);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            z-index: 10;
            animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input Styling Fixes for Autocomplete */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0f172a inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="antialiased selection:bg-emerald-500/30">

    <!-- Background Blobs -->
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Main Auth Container (Mobile First Sizing) -->
    <div class="w-[92%] sm:w-[85%] md:w-full max-w-[420px] relative z-10">
        
        <div class="glass-card rounded-[2rem] p-6 sm:p-8 md:p-10">
            
            <!-- Header -->
            <div class="flex flex-col items-center mb-8">
                <img src="logo.png" alt="Flow Logo" class="h-16 w-16 mb-4 object-contain drop-shadow-2xl">
                <h1 id="title" class="text-3xl font-extrabold tracking-tight text-white drop-shadow-md">Flow</h1>
                <p id="subtitle" class="text-slate-300 text-sm font-medium mt-1.5 transition-colors">Log into your console</p>
            </div>

            <!-- LOGIN VIEW -->
            <div id="login-box" class="space-y-5 transition-all duration-300">
                <div class="space-y-4">
                    <!-- Email Input -->
                    <div class="relative group">
                        <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-400 transition-colors duration-300"></i>
                        <input type="email" id="l-email" placeholder="Email address" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:bg-white/10 focus:ring-4 focus:ring-emerald-500/10 transition-all duration-300">
                    </div>
                    
                    <!-- Password Input -->
                    <div class="relative group">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-400 transition-colors duration-300"></i>
                        <input type="password" id="l-pass" placeholder="Password" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-11 pr-12 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:bg-white/10 focus:ring-4 focus:ring-emerald-500/10 transition-all duration-300">
                        <button type="button" onclick="togglePassword('l-pass')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors p-1">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex justify-between items-center px-1">
                    <label class="flex items-center space-x-2 cursor-pointer group">
                        <input type="checkbox" class="rounded border-slate-600 bg-white/5 text-emerald-500 focus:ring-emerald-500/30">
                        <span class="text-xs text-slate-400 group-hover:text-slate-300 transition-colors">Remember me</span>
                    </label>
                    <a href="#" class="text-xs font-medium text-emerald-400/80 hover:text-emerald-400 transition-colors">Forgot Password?</a>
                </div>

                <button id="l-btn" onclick="handleLogin()" 
                    class="w-full py-3.5 rounded-xl bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-bold tracking-wide shadow-lg shadow-emerald-500/25 hover:shadow-emerald-500/40 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 uppercase text-xs disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                    Enter Arena
                </button>

                <p class="text-center text-sm text-slate-400 mt-6">
                    New User? 
                    <button onclick="toggleAuth()" class="text-emerald-400 font-semibold hover:text-emerald-300 hover:underline transition-all">
                        Register Identity
                    </button>
                </p>
            </div>

            <!-- SIGNUP VIEW -->
            <div id="signup-box" class="space-y-5 hidden transition-all duration-300">
                <div class="space-y-4">
                    <!-- Username Input -->
                    <div class="relative group">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-400 transition-colors duration-300"></i>
                        <input type="text" id="s-user" placeholder="Choose Username" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white/10 focus:ring-4 focus:ring-blue-500/10 transition-all duration-300">
                    </div>

                    <!-- Email Input -->
                    <div class="relative group">
                        <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-400 transition-colors duration-300"></i>
                        <input type="email" id="s-email" placeholder="Email address" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white/10 focus:ring-4 focus:ring-blue-500/10 transition-all duration-300">
                    </div>
                    
                    <!-- Password Input -->
                    <div class="relative group">
                        <i class="fa-solid fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-400 transition-colors duration-300"></i>
                        <input type="password" id="s-pass" placeholder="Create Password" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-11 pr-12 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white/10 focus:ring-4 focus:ring-blue-500/10 transition-all duration-300">
                        <button type="button" onclick="togglePassword('s-pass')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors p-1">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button id="s-btn" onclick="handleSignup()" 
                    class="w-full py-3.5 mt-2 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 text-white font-bold tracking-wide shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 uppercase text-xs disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                    Initialize Profile
                </button>

                <p class="text-center text-sm text-slate-400 mt-6">
                    Recognized? 
                    <button onclick="toggleAuth()" class="text-blue-400 font-semibold hover:text-blue-300 hover:underline transition-all">
                        Sign In
                    </button>
                </p>
            </div>

        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // Supabase Configuration
        const SB_URL = 'https://ueuhuyzuacvwqpfszrzy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVldWh1eXp1YWN2d3FwZnN6cnp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjQzOTksImV4cCI6MjA5MDQwMDM5OX0.DCAPnXLo7sM576-KC4HzXT09uc6nn9u00gT1RYCIxUs';
        const flowClient = window.supabase.createClient(SB_URL, SB_KEY);

        // View Toggling Logic
        function toggleAuth() {
            const login = document.getElementById('login-box');
            const signup = document.getElementById('signup-box');
            const subtitle = document.getElementById('subtitle');

            // Add simple fade effect during toggle
            login.style.opacity = '0';
            signup.style.opacity = '0';
            
            setTimeout(() => {
                login.classList.toggle('hidden');
                signup.classList.toggle('hidden');
                
                login.style.opacity = '1';
                signup.style.opacity = '1';

                if (signup.classList.contains('hidden')) {
                    subtitle.innerText = "Log into your console";
                } else {
                    subtitle.innerText = "Initialize your console";
                }
            }, 150);
        }

        // Password Visibility Logic
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Authentication Logic: Login
        async function handleLogin() {
            const email = document.getElementById('l-email').value;
            const password = document.getElementById('l-pass').value;
            const btn = document.getElementById('l-btn');

            if(!email || !password) return alert("Credentials required.");
            
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Verifying...`;
            btn.disabled = true;

            const { error } = await flowClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert(error.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        }

        // Authentication Logic: Signup
        async function handleSignup() {
            const email = document.getElementById('s-email').value;
            const password = document.getElementById('s-pass').value;
            const username = document.getElementById('s-user').value;
            const btn = document.getElementById('s-btn');

            if(!email || !password || !username) return alert("Incomplete data.");

            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Syncing Data...`;
            btn.disabled = true;

            try {
                const { data, error } = await flowClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { username: username, coins: 0 } }
                });

                if (error) throw error;
                if (data.user) window.location.href = 'index.html';
            } catch (err) {
                alert(err.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
