<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Arena | Breach</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0;
            background: #000; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Centered Mobile Joystick */
        .joystick-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 100;
        }

        .player-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 1rem;
            backdrop-filter: blur(5px);
            text-align: center;
            min-width: 100px;
        }

        .life-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-panel">
            <div class="player-card">
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-tighter">Host Score</span>
                <h2 id="score-host" class="text-3xl font-black text-white m-0 leading-none pb-1">0</h2>
                <div id="p1-hp" class="flex justify-center mt-1">
                    <div class="life-dot bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                    <div class="life-dot bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                    <div class="life-dot bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                    <div class="life-dot bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                    <div class="life-dot bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                    <div class="life-dot bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                    <div class="life-dot bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                </div>
            </div>
            
            <div class="text-center mt-2 px-4 py-2 bg-black/50 rounded-full border border-white/10 backdrop-blur-md">
                <div id="game-status" class="text-xs text-slate-300 font-bold uppercase tracking-widest">Connecting...</div>
            </div>

            <div class="player-card">
                <span class="text-[10px] font-bold text-rose-400 uppercase tracking-tighter">Guest Score</span>
                <h2 id="score-guest" class="text-3xl font-black text-white m-0 leading-none pb-1">0</h2>
                <div id="p2-hp" class="flex justify-center mt-1">
                    <div class="life-dot bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                    <div class="life-dot bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                    <div class="life-dot bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                    <div class="life-dot bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                    <div class="life-dot bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                    <div class="life-dot bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                    <div class="life-dot bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                </div>
            </div>
        </div>

        <canvas id="arena"></canvas>

        <div class="joystick-container" id="joystick-zone">
            <div class="joystick-knob" id="knob"></div>
        </div>
    </div>

    <script>
        // --- CONFIG & SUPABASE ---
        const ARENA_SB_URL = 'https://ueuhuyzuacvwqpfszrzy.supabase.co';
        const ARENA_SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVldWh1eXp1YWN2d3FwZnN6cnp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjQzOTksImV4cCI6MjA5MDQwMDM5OX0.DCAPnXLo7sM576-KC4HzXT09uc6nn9u00gT1RYCIxUs';
        const arenaClient = window.supabase.createClient(ARENA_SB_URL, ARENA_SB_KEY);

        const params = new URLSearchParams(window.location.search);
        const matchId = params.get('match') || 'tank_test_match';
        const myId = params.get('user') || 'user_' + Math.floor(Math.random() * 1000);
        const role = params.get('role') || (Math.random() > 0.5 ? 'host' : 'guest');

        // --- THEME GENERATION (Deterministic based on Match ID) ---
        const THEMES = [
            { name: 'Grassland', bg: '#2f4f2f', grid: '#3e6b3e', blockTop: '#8b5a2b', blockSide: '#5c3a21', accent: '#000' },
            { name: 'Desert', bg: '#d2b48c', grid: '#cdaa7d', blockTop: '#cd853f', blockSide: '#8b4513', accent: '#000' },
            { name: 'Iceland', bg: '#e0ffff', grid: '#b0e0e6', blockTop: '#ffffff', blockSide: '#87ceeb', accent: '#000' }
        ];
        const themeIndex = matchId.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % THEMES.length;
        const ENV = THEMES[themeIndex];

        // --- GAME CONSTANTS ---
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');
        const TANK_WIDTH = 26;
        const TANK_HEIGHT = 26;
        const SPEED = 2.5;
        const BULLET_SPEED = 10;
        const FIRE_RATE = 700; // Auto-fire every 0.7 seconds
        const MAX_LIVES = 7;

        // Map Design (Relative values to canvas size)
        const obstacles = [
            // Center Cover (Box)
            { x: 0.45, y: 0.45, w: 0.1, h: 0.1, type: 'box' },
            // Top Left L-Shape
            { x: 0.20, y: 0.20, w: 0.04, h: 0.15, type: 'wall' },
            { x: 0.24, y: 0.20, w: 0.1, h: 0.04, type: 'wall' },
            // Bottom Right L-Shape
            { x: 0.76, y: 0.65, w: 0.04, h: 0.15, type: 'wall' },
            { x: 0.66, y: 0.76, w: 0.1, h: 0.04, type: 'wall' },
            // Side Fences
            { x: 0.5, y: 0.1, w: 0.02, h: 0.15, type: 'fence' },
            { x: 0.5, y: 0.75, w: 0.02, h: 0.15, type: 'fence' }
        ];

        // --- STATE ---
        let me = { 
            x: 0, y: 0, hp: MAX_LIVES, score: 0, angle: 0, recoil: 0,
            color: role === 'host' ? '#3b82f6' : '#f43f5e',
            id: myId
        };

        let opponent = { 
            x: 0, y: 0, hp: MAX_LIVES, score: 0, angle: 0, recoil: 0,
            color: role === 'host' ? '#f43f5e' : '#3b82f6'
        };

        let bullets = [];
        let joystick = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
        let channel;
        let lastShotTime = 0;
        let shakeAmount = 0;
        let audioCtx;

        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            // Set starting positions in extreme opposite corners
            if (role === 'host') {
                me.x = canvas.width * 0.08; me.y = canvas.height * 0.15;
                opponent.x = canvas.width * 0.92; opponent.y = canvas.height * 0.85;
                // Face the center roughly
                me.angle = Math.PI / 4; 
                opponent.angle = Math.PI + (Math.PI / 4);
            } else {
                me.x = canvas.width * 0.92; me.y = canvas.height * 0.85;
                opponent.x = canvas.width * 0.08; opponent.y = canvas.height * 0.15;
                me.angle = Math.PI + (Math.PI / 4); 
                opponent.angle = Math.PI / 4;
            }

            document.getElementById('game-status').innerText = `Arena: ${ENV.name}`;

            setupNetworking();
            setupControls();
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // --- AUDIO SYSTEM (Synthesized Explosion) ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playExplosionSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // --- NETWORKING ---
        function setupNetworking() {
            channel = arenaClient.channel(`tank_arena_${matchId}`);

            channel
                .on('broadcast', { event: 'move' }, ({ payload }) => {
                    if (payload.id !== myId) {
                        opponent.x = payload.x;
                        opponent.y = payload.y;
                        opponent.angle = payload.angle;
                    }
                })
                .on('broadcast', { event: 'shoot' }, ({ payload }) => {
                    if (payload.id !== myId) {
                        bullets.push({ ...payload.bullet, remote: true });
                        opponent.recoil = 8; // Visual recoil for opponent
                    }
                })
                .on('broadcast', { event: 'hit' }, ({ payload }) => {
                    // Fix: If the person who shot the bullet IS NOT me, it means I am the target taking damage
                    if (payload.shooterId !== myId) {
                        takeDamage();
                    }
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        document.getElementById('game-status').innerText += " (Live)";
                    }
                });
        }

        // --- CONTROLS ---
        function setupControls() {
            const zone = document.getElementById('joystick-zone');
            const knob = document.getElementById('knob');

            // Initialize audio on first interaction
            document.body.addEventListener('touchstart', initAudio, { once: true });
            document.body.addEventListener('click', initAudio, { once: true });

            zone.addEventListener('touchstart', (e) => {
                joystick.active = true;
                joystick.startX = e.touches[0].clientX;
                joystick.startY = e.touches[0].clientY;
            });

            window.addEventListener('touchmove', (e) => {
                if (!joystick.active) return;
                const touch = Array.from(e.touches).find(t => t.target.closest('#joystick-zone') || joystick.active);
                if (!touch) return;

                const dx = touch.clientX - joystick.startX;
                const dy = touch.clientY - joystick.startY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40); // max drag dist
                const angle = Math.atan2(dy, dx);

                joystick.x = Math.cos(angle) * (dist / 40);
                joystick.y = Math.sin(angle) * (dist / 40);

                knob.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
            });

            window.addEventListener('touchend', () => {
                joystick.active = false;
                joystick.x = 0;
                joystick.y = 0;
                knob.style.transform = `translate(0, 0)`;
            });
        }

        // --- GAME MECHANICS ---
        function autoShoot() {
            if (me.hp <= 0) return;

            const b = {
                id: Math.random(),
                x: me.x + Math.cos(me.angle) * (TANK_WIDTH/2 + 10),
                y: me.y + Math.sin(me.angle) * (TANK_WIDTH/2 + 10),
                vx: Math.cos(me.angle) * BULLET_SPEED,
                vy: Math.sin(me.angle) * BULLET_SPEED,
                owner: myId
            };

            bullets.push(b);
            me.recoil = 8; // trigger visual recoil locally
            channel.send({ type: 'broadcast', event: 'shoot', payload: { id: myId, bullet: b } });
        }

        function takeDamage() {
            me.hp--;
            opponent.score++; // If I took damage, opponent scored a hit
            shakeAmount = 20; // Trigger screen vibrate
            playExplosionSound();
            updateUI();
            
            if (me.hp <= 0) finalizeGame('defeat');
        }

        function registerHitOnOpponent() {
            opponent.hp--;
            me.score++;
            updateUI();
            // Tell everyone that I fired the shot that connected
            channel.send({ type: 'broadcast', event: 'hit', payload: { shooterId: myId } });
            
            if (opponent.hp <= 0) finalizeGame('victory');
        }

        function updateUI() {
            // Update Scores
            document.getElementById('score-host').innerText = role === 'host' ? me.score : opponent.score;
            document.getElementById('score-guest').innerText = role === 'guest' ? me.score : opponent.score;

            // Update HP (Dots)
            const myHearts = document.getElementById(role === 'host' ? 'p1-hp' : 'p2-hp').children;
            const oppHearts = document.getElementById(role === 'host' ? 'p2-hp' : 'p1-hp').children;
            
            for(let i=0; i < MAX_LIVES; i++) {
                if(myHearts[i]) myHearts[i].style.opacity = i < me.hp ? '1' : '0.2';
                if(oppHearts[i]) oppHearts[i].style.opacity = i < opponent.hp ? '1' : '0.2';
            }
        }

        // Helper to check box collisions
        function rectIntersect(x, y, w, h, rx, ry, rw, rh) {
            return (x < rx + rw && x + w > rx && y < ry + rh && y + h > ry);
        }

        // --- CORE LOOP ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (me.hp <= 0) return;

            // Auto Fire Logic
            if (Date.now() - lastShotTime > FIRE_RATE) {
                autoShoot();
                lastShotTime = Date.now();
            }

            // Movement & Collision
            let nextX = me.x + joystick.x * SPEED;
            let nextY = me.y + joystick.y * SPEED;

            let collisionX = false;
            let collisionY = false;
            const hw = TANK_WIDTH / 2;

            obstacles.forEach(w => {
                const wx = w.x * canvas.width; const wy = w.y * canvas.height;
                const ww = w.w * canvas.width; const wh = w.h * canvas.height;
                
                if (rectIntersect(nextX - hw, me.y - hw, TANK_WIDTH, TANK_HEIGHT, wx, wy, ww, wh)) collisionX = true;
                if (rectIntersect(me.x - hw, nextY - hw, TANK_WIDTH, TANK_HEIGHT, wx, wy, ww, wh)) collisionY = true;
            });

            if (!collisionX) me.x = Math.max(hw, Math.min(canvas.width - hw, nextX));
            if (!collisionY) me.y = Math.max(hw, Math.min(canvas.height - hw, nextY));

            if (joystick.x !== 0 || joystick.y !== 0) {
                me.angle = Math.atan2(joystick.y, joystick.x);
            }

            // Recoil decay
            if (me.recoil > 0) me.recoil -= 0.5;
            if (opponent.recoil > 0) opponent.recoil -= 0.5;

            // Sync with opponent continuously
            channel.send({ type: 'broadcast', event: 'move', payload: { id: myId, x: me.x, y: me.y, angle: me.angle } });

            // Update Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                let destroyed = false;

                // Hit opponent? (Only check if I am the owner)
                if (b.owner === myId) {
                    const dist = Math.sqrt((b.x - opponent.x)**2 + (b.y - opponent.y)**2);
                    if (dist < TANK_WIDTH) {
                        registerHitOnOpponent();
                        destroyed = true;
                    }
                }

                // Hit Wall
                obstacles.forEach(w => {
                    const wx = w.x * canvas.width; const wy = w.y * canvas.height;
                    const ww = w.w * canvas.width; const wh = w.h * canvas.height;
                    if (b.x > wx && b.x < wx + ww && b.y > wy && b.y < wy + wh) {
                        destroyed = true;
                    }
                });

                // Screen bounds
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) destroyed = true;

                if (destroyed) bullets.splice(i, 1);
            }
        }

        // --- RENDERING ---
        function draw() {
            // Screen Shake calculation
            ctx.save();
            if (shakeAmount > 0) {
                const dx = (Math.random() - 0.5) * shakeAmount;
                const dy = (Math.random() - 0.5) * shakeAmount;
                ctx.translate(dx, dy);
                shakeAmount *= 0.9;
                if (shakeAmount < 0.5) shakeAmount = 0;
            }

            // Background
            ctx.fillStyle = ENV.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Terrain Grid
            ctx.strokeStyle = ENV.grid;
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=60) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=60) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

            // Draw Obstacles (Pseudo-3D)
            obstacles.forEach(w => {
                const wx = w.x * canvas.width; const wy = w.y * canvas.height;
                const ww = w.w * canvas.width; const wh = w.h * canvas.height;

                // Side (Depth)
                ctx.fillStyle = ENV.blockSide;
                ctx.fillRect(wx + 4, wy + 4, ww, wh);
                // Top
                ctx.fillStyle = ENV.blockTop;
                ctx.fillRect(wx, wy, ww, wh);
                
                // Details based on type
                if(w.type === 'box') {
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.strokeRect(wx+5, wy+5, ww-10, wh-10);
                }
            });

            if (me.hp > 0) drawTank(me);
            if (opponent.hp > 0) drawTank(opponent);

            // Draw Shells (Bullets)
            bullets.forEach(b => {
                ctx.fillStyle = '#fcd34d'; // bright yellow shell
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fbbf24';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            ctx.restore(); // Restore from shake
        }

        function drawTank(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            
            // Base shadow
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(3, 3, TANK_WIDTH/1.5, TANK_HEIGHT/1.5, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.rotate(p.angle);

            // Left & Right Tracks
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-14, -18, 28, 8); // left
            ctx.fillRect(-14, 10, 28, 8);  // right
            
            // Track detailing
            ctx.fillStyle = '#0f172a';
            for(let i = -12; i < 12; i+=6) {
                ctx.fillRect(i, -18, 2, 8);
                ctx.fillRect(i, 10, 2, 8);
            }

            // Armored Hull
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.roundRect(-12, -12, 24, 24, 4);
            ctx.fill();
            
            // Hull Detail
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.strokeRect(-9, -9, 18, 18);

            // Turret & Barrel with Visual Recoil
            let currentRecoil = p.recoil || 0;
            
            // Barrel
            ctx.fillStyle = '#64748b'; // metallic grey
            ctx.fillRect(0 - currentRecoil, -3, 22, 6);
            ctx.fillStyle = '#334155'; // barrel tip
            ctx.fillRect(18 - currentRecoil, -4, 4, 8);
            
            // Turret Base
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.arc(0 - currentRecoil, 0, 9, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(0 - currentRecoil, 0, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        async function finalizeGame(result) {
            if (result === 'victory') {
                confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
                
                // --- ADD YOUR WALLET / BLOCKCHAIN REWARD LOGIC HERE --- 
                
                Swal.fire({
                    title: 'TARGET DESTROYED',
                    text: `You won! 180 Coins added to your wallet.`,
                    icon: 'success',
                    background: '#020617', color: '#fff',
                    confirmButtonText: 'Claim & Exit'
                }).then(() => {
                    window.location.replace('index.html');
                });
            } else {
                Swal.fire({
                    title: 'ARMOR BREACHED',
                    text: `You were destroyed. No rewards.`,
                    icon: 'error',
                    background: '#020617', color: '#fff',
                    confirmButtonText: 'Return to Base'
                }).then(() => {
                    window.location.replace('index.html');
                });
            }
        }

        init();
    </script>
</body>
</html>
