<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow | 3D Coin Flip Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        #coin-canvas-container { width: 100%; height: 280px; display: flex; align-items: center; justify-content: center; }
        .player-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: #1e293b; border: 2px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .active-turn .player-avatar { border: 3px solid #3b82f6; transform: scale(1.15); box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        #marquee-container { position: fixed; top: 140px; width: 100%; pointer-events: none; overflow: hidden; white-space: nowrap; z-index: 50; }
        .marquee-text { display: inline-block; animation: marquee 8s linear forwards; font-weight: 800; font-size: 1.1rem; color: #60a5fa; text-shadow: 0 0 10px rgba(59,130,246,0.5); }
        @keyframes marquee { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
        .swal2-popup { border-radius: 1.5rem !important; background: #0f172a !important; color: white !important; }
    </style>
</head>
<body class="max-w-md mx-auto flex flex-col h-screen p-6">

    <div class="flex justify-between items-end bg-slate-900/80 backdrop-blur-md p-5 rounded-3xl border border-white/10 relative z-10 shadow-2xl">
        <div id="host-section" class="flex flex-col items-center gap-2">
            <img id="host-pfp" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" class="player-avatar">
            <p id="host-name" class="text-[10px] font-black text-blue-400 uppercase w-20 text-center truncate">Host</p>
            <h2 id="score-host" class="text-4xl font-black">0</h2>
        </div>
        
        <div class="text-center pb-2">
            <p class="text-xs font-black text-slate-500 tracking-tighter">ROUND <span id="round-num">1</span>/5</p>
            <div class="bg-yellow-500/20 px-4 py-1 rounded-full border border-yellow-500/30 mt-2">
                <p class="text-[10px] text-yellow-500 font-black uppercase tracking-widest">Pot: <span id="display-pot">0</span></p>
            </div>
        </div>
        
        <div id="guest-section" class="flex flex-col items-center gap-2">
            <img id="guest-pfp" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" class="player-avatar">
            <p id="guest-name" class="text-[10px] font-black text-slate-400 uppercase w-20 text-center truncate">Guest</p>
            <h2 id="score-guest" class="text-4xl font-black text-slate-400">0</h2>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center relative">
        <div id="coin-canvas-container"></div>
        <div id="status-text" class="absolute bottom-4 text-xs font-black text-blue-500 animate-pulse tracking-[0.2em] uppercase">Initializing...</div>
    </div>

    <div id="marquee-container"></div>

    <div class="space-y-4 mb-6 relative z-10">
        <button id="flip-btn" onclick="triggerFlip()" class="hidden w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 py-5 rounded-2xl font-black uppercase tracking-widest shadow-[0_10px_30px_rgba(37,99,235,0.3)] active:scale-95 transition-all">FLIP COIN</button>
        
        <div class="flex items-center gap-3">
            <div id="chat-input-container" class="hidden flex-1">
                <input type="text" id="chat-input" placeholder="Trash talk here..." class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500 transition-all text-white">
            </div>
            <button onclick="toggleChat()" class="w-14 h-14 rounded-2xl bg-slate-800/80 flex items-center justify-center border border-white/10 hover:bg-slate-700 active:scale-90 transition-all shadow-xl">
                <i class="fa-solid fa-comment-dots text-xl"></i>
            </button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ueuhuyzuacvwqpfszrzy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVldWh1eXp1YWN2d3FwZnN6cnp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjQzOTksImV4cCI6MjA5MDQwMDM5OX0.DCAPnXLo7sM576-KC4HzXT09uc6nn9u00gT1RYCIxUs';
        const flowClient = window.supabase.createClient(SB_URL, SB_KEY);

        const params = new URLSearchParams(window.location.search);
        const matchId = params.get('match') || 'dev_coin_arena';
        const wager = parseInt(params.get('wager')) || 100;
        const hostId = params.get('host');
        const guestId = params.get('guest');
        
        let currentUser, myRole, gameChannel;
        let currentRound = 1, scores = { host: 0, guest: 0 };
        let gameActive = false, currentTurn = 'host', matchStarted = false;
        let scene, camera, renderer, coinMesh, isFlipping3D = false, flipStartTime = 0, targetRotationX = 0;

        async function init() {
            const { data: { session } } = await flowClient.auth.getSession();
            currentUser = session ? session.user : { id: hostId || 'anon' }; 

            if (currentUser.id === hostId) myRole = 'host';
            else if (currentUser.id === guestId) myRole = 'guest';
            else { Swal.fire('Error', 'Unauthorized player.', 'error'); return; }
            
            document.getElementById('display-pot').innerText = (wager * 2).toLocaleString();
            await fetchProfiles();
            initThreeJS();
            setupRealtime();
        }

        async function fetchProfiles() {
            const fallback = (n) => `https://ui-avatars.com/api/?name=${n}&background=1e293b&color=fff&bold=true`;
            const { data: p } = await flowClient.from('profiles').select('id, username, raw_user_meta_data').in('id', [hostId, guestId]);
            const h = p?.find(x => x.id === hostId), g = p?.find(x => x.id === guestId);
            
            document.getElementById('host-name').innerText = h?.username || h?.raw_user_meta_data?.username || 'Host';
            document.getElementById('host-pfp').src = h?.raw_user_meta_data?.avatar_url || fallback('H');
            document.getElementById('guest-name').innerText = g?.username || g?.raw_user_meta_data?.username || 'Guest';
            document.getElementById('guest-pfp').src = g?.raw_user_meta_data?.avatar_url || fallback('G');
        }

        function setupRealtime() {
            gameChannel = flowClient.channel(`room_${matchId}`, { config: { presence: { key: myRole } } });

            gameChannel
                .on('presence', { event: 'sync' }, () => {
                    const state = gameChannel.presenceState();
                    const players = Object.keys(state);
                    
                    if (myRole === 'host' && players.includes('host') && players.includes('guest') && !matchStarted) {
                        matchStarted = true;
                        setTimeout(() => {
                            gameChannel.send({ type: 'broadcast', event: 'start_game' });
                            beginGame();
                        }, 1000);
                    }
                })
                .on('broadcast', { event: 'start_game' }, () => { if(myRole === 'guest') beginGame(); })
                .on('broadcast', { event: 'flip_act' }, ({ payload }) => {
                    if (payload.role === currentTurn && payload.role !== myRole) executeFlip(payload.result);
                })
                .on('broadcast', { event: 'chat' }, ({ payload }) => showMarquee(`${payload.sender}: ${payload.msg}`))
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await gameChannel.track({ online_at: new Date().toISOString() });
                        document.getElementById('status-text').innerText = "Waiting for Opponent...";
                    }
                });
        }

        function beginGame() {
            gameActive = true;
            updateTurnUI();
        }

        function updateTurnUI() {
            document.getElementById('host-section').classList.toggle('active-turn', currentTurn === 'host');
            document.getElementById('guest-section').classList.toggle('active-turn', currentTurn === 'guest');
            const btn = document.getElementById('flip-btn'), status = document.getElementById('status-text');

            if (myRole === currentTurn && gameActive) {
                btn.classList.remove('hidden');
                status.innerText = "YOUR TURN TO FLIP!";
                status.className = "absolute bottom-4 text-xs font-black text-blue-400 animate-pulse tracking-widest uppercase";
            } else {
                btn.classList.add('hidden');
                status.innerText = `WAITING FOR ${currentTurn.toUpperCase()}...`;
                status.className = "absolute bottom-4 text-xs font-black text-slate-600 tracking-widest uppercase";
            }
        }

        function triggerFlip() {
            if (isFlipping3D || !gameActive || myRole !== currentTurn) return;
            const res = Math.random() < 0.5 ? 'heads' : 'tails';
            gameChannel.send({ type: 'broadcast', event: 'flip_act', payload: { result: res, role: myRole } });
            executeFlip(res);
        }

        function executeFlip(res) {
            isFlipping3D = true; flipStartTime = Date.now();
            targetRotationX = res === 'heads' ? Math.PI / 2 : -Math.PI / 2;
            document.getElementById('flip-btn').classList.add('hidden');
            document.getElementById('status-text').innerText = "COIN IN THE AIR...";

            setTimeout(() => {
                isFlipping3D = false; coinMesh.rotation.x = targetRotationX; 
                if (res === 'heads') { scores.host++; document.getElementById('score-host').innerText = scores.host; }
                else { scores.guest++; document.getElementById('score-guest').innerText = scores.guest; }
                
                if (currentRound < 5) {
                    currentRound++; document.getElementById('round-num').innerText = currentRound;
                    currentTurn = currentTurn === 'host' ? 'guest' : 'host';
                    updateTurnUI();
                } else {
                    gameActive = false;
                    const winRole = scores.host > scores.guest ? 'host' : 'guest';
                    setTimeout(() => finalizeGame(winRole), 800);
                }
            }, 3050);
        }

        function initThreeJS() {
            const container = document.getElementById('coin-canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.z = 10;
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            const geo = new THREE.CylinderGeometry(2.8, 2.8, 0.4, 64);
            const headsTex = createCoinTex('H', true), tailsTex = createCoinTex('T', false);
            const mats = [
                new THREE.MeshStandardMaterial({ color: 0xfbbf24, metalness: 0.9, roughness: 0.1 }),
                new THREE.MeshStandardMaterial({ map: headsTex, metalness: 0.6, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ map: tailsTex, metalness: 0.6, roughness: 0.3 })
            ];
            coinMesh = new THREE.Mesh(geo, mats);
            coinMesh.rotation.x = Math.PI / 2;
            scene.add(coinMesh);
            animate();
        }

        function createCoinTex(txt, isH) {
            const canv = document.createElement('canvas'); canv.width = 512; canv.height = 512;
            const c = canv.getContext('2d');
            const grad = c.createRadialGradient(256, 256, 0, 256, 256, 256);
            grad.addColorStop(0, isH ? '#fbbf24' : '#94a3b8');
            grad.addColorStop(1, isH ? '#b45309' : '#334155');
            c.fillStyle = grad; c.beginPath(); c.arc(256, 256, 256, 0, Math.PI*2); c.fill();
            c.strokeStyle = 'rgba(255,255,255,0.2)'; c.lineWidth = 15; c.beginPath(); c.arc(256, 256, 230, 0, Math.PI*2); c.stroke();
            c.fillStyle = 'rgba(0,0,0,0.4)'; c.font = '900 280px Inter'; c.textAlign = 'center'; c.textBaseline = 'middle';
            c.fillText(txt, 256, 270);
            return new THREE.CanvasTexture(canv);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isFlipping3D) {
                const p = Math.min((Date.now() - flipStartTime) / 3000, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                coinMesh.rotation.x = (Math.PI/2) + (Math.PI * 24 * ease) + (targetRotationX - (Math.PI/2)) * ease;
                coinMesh.position.y = Math.sin(p * Math.PI) * 5;
            } else {
                coinMesh.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }

        async function finalizeGame(winnerRole) {
            if (myRole === winnerRole) {
                const winAmt = Math.floor(wager * 1.8);
                confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
                if (!currentUser.id.startsWith('anon')) {
                    const { data } = await flowClient.from('profiles').select('coins').eq('id', currentUser.id).single();
                    if (data) await flowClient.from('profiles').update({ coins: data.coins + winAmt }).eq('id', currentUser.id);
                }
                Swal.fire({ title: 'VICTORY!', text: `You banked ${winAmt} coins!`, icon: 'success' }).then(() => window.location.replace('index.html'));
            } else {
                Swal.fire({ title: 'DEFEAT', text: 'You lost the wager.', icon: 'error' }).then(() => window.location.replace('index.html'));
            }
        }

        function toggleChat() {
            const container = document.getElementById('chat-input-container');
            container.classList.toggle('hidden');
            if (!container.classList.contains('hidden')) document.getElementById('chat-input').focus();
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const msg = e.target.value.trim(); if (!msg) return;
                gameChannel.send({ type: 'broadcast', event: 'chat', payload: { msg, sender: myRole === 'host' ? 'Host' : 'Guest' } });
                showMarquee(`You: ${msg}`); e.target.value = ""; toggleChat();
            }
        });

        function showMarquee(text) {
            const container = document.getElementById('marquee-container');
            const el = document.createElement('div'); el.className = 'marquee-text'; el.innerText = text;
            container.appendChild(el); setTimeout(() => el.remove(), 8000);
        }

        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('resize', () => {
            if(!camera || !renderer) return;
            const c = document.getElementById('coin-canvas-container');
            camera.aspect = c.clientWidth / c.clientHeight; camera.updateProjectionMatrix();
            renderer.setSize(c.clientWidth, c.clientHeight);
        });
    </script>
</body>
</html>
