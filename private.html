<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coming Soon</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #0f172a, #020617);
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
    }

    /* glowing animated background blobs */
    .blob {
        position: absolute;
        width: 300px;
        height: 300px;
        background: rgba(59,130,246,0.3);
        filter: blur(80px);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
    }

    .blob.one { top: 10%; left: 15%; }
    .blob.two { bottom: 10%; right: 15%; background: rgba(168,85,247,0.25); }

    @keyframes float {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(40px); }
    }

    /* center container */
    .scene {
        perspective: 1000px;
        z-index: 2;
        text-align: center;
    }

    /* 3D text */
    .tilt-text {
        font-size: 60px;
        font-weight: 900;
        letter-spacing: 4px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #3b82f6, #a855f7, #22c55e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        transform-style: preserve-3d;
        transition: transform 0.1s ease-out;
        text-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .sub {
        margin-top: 10px;
        font-size: 12px;
        letter-spacing: 3px;
        color: rgba(255,255,255,0.6);
    }

    /* glow ring */
    .ring {
        position: absolute;
        width: 250px;
        height: 250px;
        border: 2px solid rgba(59,130,246,0.3);
        border-radius: 50%;
        animation: pulse 3s infinite ease-in-out;
        z-index: 1;
    }

    @keyframes pulse {
        0%,100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 0.2; }
    }
</style>
</head>

<body>

<div class="blob one"></div>
<div class="blob two"></div>
<div class="ring"></div>

<div class="scene">
    <div id="text" class="tilt-text">COMING SOON</div>
    <div class="sub">Flow</div>
</div>

<script>
const text = document.getElementById("text");

// fallback mouse control (desktop)
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 30;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 30;
});

// phone tilt support
window.addEventListener("deviceorientation", (e) => {
    let beta = e.beta || 0;   // front/back tilt
    let gamma = e.gamma || 0; // left/right tilt

    text.style.transform = `
        rotateX(${-beta / 2}deg)
        rotateY(${gamma / 2}deg)
        scale(1.05)
    `;
});

// smooth animation loop (desktop fallback)
function animate() {
    requestAnimationFrame(animate);

    if (!("DeviceOrientationEvent" in window)) {
        text.style.transform = `
            rotateX(${-mouseY}deg)
            rotateY(${mouseX}deg)
            scale(1.05)
        `;
    }
}
animate();
</script>

</body>
</html>
