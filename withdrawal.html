<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow | Premium Withdrawal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020617; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
        }

        /* Animated Background Orbs */
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; animation: float 10s infinite ease-in-out alternate; }
        .orb-1 { width: 300px; height: 300px; background: rgba(59, 130, 246, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: rgba(139, 92, 246, 0.1); bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(50px) scale(1.1); } }

        /* Premium Glass Panel */
        .glass-panel { 
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.9) 100%);
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Floating Label Inputs */
        .input-group { position: relative; margin-bottom: 1.5rem; }
        .input-field {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.25rem 1rem 0.5rem 1rem;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .input-field:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); background: rgba(15, 23, 42, 0.9); }
        .floating-label {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1rem;
            font-weight: 500;
            pointer-events: none;
            transition: all 0.2s ease-out;
        }
        /* JS will toggle this class when focused or has value */
        .input-field.active ~ .floating-label {
            top: 0.8rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: #3b82f6;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* iOS Style Toggle Switch */
        .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }

        /* Hide Number Arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* SweetAlert Theming */
        .swal2-popup { border-radius: 1.5rem !important; background: #0f172a !important; color: white !important; border: 1px solid rgba(255,255,255,0.1); }
        .swal2-title { font-family: 'Outfit', sans-serif !important; font-weight: 900 !important; }
    </style>
</head>
<body class="max-w-md mx-auto flex flex-col min-h-screen relative p-5">

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="flex items-center justify-between mt-2 mb-6 relative z-10">
        <button onclick="window.history.back()" class="w-12 h-12 rounded-2xl glass-panel flex items-center justify-center hover:bg-slate-800 transition-all active:scale-90">
            <i class="fa-solid fa-chevron-left text-slate-300"></i>
        </button>
        <h1 class="text-xl font-black uppercase tracking-[0.2em] text-white text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">Withdraw</h1>
        <div class="w-12"></div> </header>

    <div class="glass-panel rounded-3xl p-8 mb-8 text-center relative overflow-hidden z-10">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-blue-500 opacity-50"></div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Available Balance</p>
        <h2 class="text-5xl font-black text-white flex items-center justify-center gap-3 tracking-tight">
            <i class="fa-solid fa-coins text-3xl text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]"></i>
            <span id="current-balance">...</span>
        </h2>
        <div class="mt-4 inline-block bg-blue-500/10 border border-blue-500/20 rounded-full px-4 py-1.5">
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest"><i class="fa-solid fa-shield-halved mr-1"></i> Secure Transaction</p>
        </div>
    </div>

    <form id="withdraw-form" class="flex-1 flex flex-col relative z-10">
        
        <div class="input-group">
            <input type="number" id="w-amount" class="input-field text-xl text-blue-400 font-black" required min="1">
            <label class="floating-label">Amount to Withdraw</label>
        </div>

        <div class="input-group">
            <input type="text" id="w-bank-name" class="input-field" required>
            <label class="floating-label">Bank Name</label>
        </div>

        <div class="input-group">
            <input type="number" id="w-account-num" class="input-field tracking-widest font-mono" required>
            <label class="floating-label">Account Number</label>
        </div>

        <div class="input-group">
            <input type="text" id="w-account-name" class="input-field" required>
            <label class="floating-label">Account Holder Name</label>
        </div>

        <div class="flex items-center justify-between mt-2 mb-8 glass-panel p-4 rounded-2xl">
            <div class="flex flex-col">
                <span class="text-sm font-bold text-white">Save Details</span>
                <span class="text-xs text-slate-400">Remember this bank for next time</span>
            </div>
            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                <input type="checkbox" name="toggle" id="save-bank-info" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-slate-700 appearance-none cursor-pointer z-10 transition-transform duration-300 ease-in-out"/>
                <label for="save-bank-info" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-700 cursor-pointer transition-colors duration-300 ease-in-out"></label>
            </div>
        </div>

        <div class="mt-auto pt-4 pb-6">
            <button type="submit" id="submit-btn" class="relative w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 py-4 rounded-2xl font-black uppercase tracking-widest shadow-[0_10px_30px_rgba(59,130,246,0.3)] active:scale-95 transition-all text-white overflow-hidden group">
                <span id="btn-text" class="relative z-10">Confirm Withdrawal</span>
                <div class="absolute top-0 left-[-100%] w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:left-[100%] transition-all duration-700"></div>
            </button>
        </div>
    </form>

    <script>
        // --- SUPABASE SETUP ---
        const SB_URL = 'https://ueuhuyzuacvwqpfszrzy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVldWh1eXp1YWN2d3FwZnN6cnp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjQzOTksImV4cCI6MjA5MDQwMDM5OX0.DCAPnXLo7sM576-KC4HzXT09uc6nn9u00gT1RYCIxUs';
        const flowClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentBalance = 0;

        // --- FLOATING LABEL LOGIC (No Placeholders) ---
        const inputs = document.querySelectorAll('.input-field');
        
        function updateInputState(input) {
            if (input.value.trim() !== '') {
                input.classList.add('active');
            } else {
                input.classList.remove('active');
            }
        }

        inputs.forEach(input => {
            // Check on load (for prefilled data)
            updateInputState(input);
            // Check on focus/blur/input
            input.addEventListener('focus', () => input.classList.add('active'));
            input.addEventListener('blur', () => updateInputState(input));
            input.addEventListener('input', () => updateInputState(input));
        });

        // --- INITIALIZATION ---
        async function init() {
            const { data: { session } } = await flowClient.auth.getSession();
            if (!session) {
                window.location.replace('auth.html'); 
                return;
            }
            currentUser = session.user;

            await fetchBalance();
            loadSavedBankInfo();
        }

        async function fetchBalance() {
            const { data, error } = await flowClient.from('profiles').select('coins').eq('id', currentUser.id).single();
            if (data) {
                currentBalance = parseFloat(data.coins) || 0;
                document.getElementById('current-balance').innerText = currentBalance.toLocaleString();
                document.getElementById('w-amount').setAttribute('max', currentBalance);
            }
        }

        function loadSavedBankInfo() {
            const savedData = localStorage.getItem('flow_bank_info');
            if (savedData) {
                const info = JSON.parse(savedData);
                document.getElementById('w-bank-name').value = info.bankName || '';
                document.getElementById('w-account-num').value = info.accountNum || '';
                document.getElementById('w-account-name').value = info.accountName || '';
                document.getElementById('save-bank-info').checked = true;
                
                // Trigger the floating labels for prefilled inputs
                inputs.forEach(updateInputState);
            }
        }

        // --- FORM SUBMISSION ---
        document.getElementById('withdraw-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const amount = parseFloat(document.getElementById('w-amount').value);
            const bankName = document.getElementById('w-bank-name').value.trim();
            const accountNum = document.getElementById('w-account-num').value.trim();
            const accountName = document.getElementById('w-account-name').value.trim();
            const saveInfo = document.getElementById('save-bank-info').checked;

            // Security Checks
            if (amount <= 0) {
                Swal.fire('Hold on', 'Amount must be greater than 0.', 'warning');
                return;
            }
            if (amount > currentBalance) {
                Swal.fire('Insufficient Funds', 'You do not have enough coins for this withdrawal.', 'error');
                return;
            }

            // UI Loading State
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            if (saveInfo) {
                localStorage.setItem('flow_bank_info', JSON.stringify({ bankName, accountNum, accountName }));
            } else {
                localStorage.removeItem('flow_bank_info');
            }

            const transactionPayload = {
                user_id: currentUser.id,
                amount: amount,
                type: 'withdrawal',
                status: 'pending',
                metadata: {
                    bank_name: bankName,
                    account_number: accountNum,
                    account_name: accountName
                }
            };

            // Database Insert
            const { error: txError } = await flowClient.from('transactions').insert([transactionPayload]);

            if (txError) {
                console.error("Database Error:", txError);
                // FIX FOR [object Object]: We extract txError.message safely
                const errorMessage = txError.message || JSON.stringify(txError);
                
                Swal.fire('Transaction Failed', `Error details: ${errorMessage}`, 'error');
                
                // Reset Button
                btn.disabled = false;
                btnText.innerText = 'Confirm Withdrawal';
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                return;
            }

            // Success Logging
            await flowClient.from('user_activity').insert([{
                user_id: currentUser.id,
                type: 'withdrawal_request',
                title: 'Withdrawal Pending',
                amount: amount
            }]);

            // Success Alert
            Swal.fire({
                title: 'Request Received!',
                text: 'Your funds will be deducted once the admin approves the transfer.',
                icon: 'success',
                background: '#0f172a',
                color: '#ffffff',
                confirmButtonColor: '#3b82f6'
            }).then(() => {
                window.location.replace('index.html'); 
            });
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
