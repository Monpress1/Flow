<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow | Food vs Bombs</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vw; max-width: 400px; max-height: 400px; margin: 0 auto; margin-top: 10px; }
        .grid-layer { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 4px; width: 100%; height: 100%; padding: 4px; }
        .tile { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; transition: all 0.2s; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Tile States */
        .tile-food { background: rgba(133, 77, 14, 0.4) !important; border-color: #eab308 !important; box-shadow: inset 0 0 15px rgba(234, 179, 8, 0.2); }
        .tile-bomb { background: rgba(153, 27, 27, 0.4) !important; border-color: #ef4444 !important; box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.4); }

        /* Joystick */
        #joystick-wrapper { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); z-index: 40; }
        #joystick-stick { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; top: 35px; left: 35px; box-shadow: 0 0 20px rgba(255,255,255,0.2); transition: transform 0.05s linear; }
        
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 20; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .swal2-popup { border-radius: 1.5rem !important; font-family: 'Inter', sans-serif !important; }
    </style>
</head>
<body class="max-w-md mx-auto flex flex-col h-screen">

    <div id="rules-overlay" class="fixed inset-0 z-[100] glass-panel flex flex-col items-center justify-center p-6 transition-opacity duration-500">
        <div class="flex gap-4 mb-4">
            <i class="fa-solid fa-burger text-5xl text-yellow-400 animate-bounce"></i>
            <i class="fa-solid fa-bomb text-5xl text-red-500 animate-pulse"></i>
        </div>
        <h1 class="text-3xl font-black text-white tracking-widest uppercase mb-4 text-center">Feast or Famine</h1>
        <div class="bg-slate-800/80 border border-white/10 p-6 rounded-3xl w-full max-w-xs shadow-2xl">
            <ul class="text-sm space-y-4 font-bold text-slate-200">
                <li class="flex items-center gap-3"><i class="fa-solid fa-burger text-yellow-400 text-lg w-6"></i> Eat food to score points.</li>
                <li class="flex items-center gap-3"><i class="fa-solid fa-bomb text-red-500 text-lg w-6"></i> Touching a bomb = INSTANT DEATH.</li>
                <li class="flex items-center gap-3"><i class="fa-solid fa-people-arrows text-blue-400 text-lg w-6"></i> Bodyblock your opponent!</li>
                <li class="flex items-center gap-3"><i class="fa-solid fa-stopwatch text-green-400 text-lg w-6"></i> 50 seconds. Winner takes 180%.</li>
            </ul>
        </div>
        <p id="rules-countdown" class="mt-8 text-6xl font-black text-blue-500">3</p>
    </div>

    <header class="p-4 flex justify-between items-center bg-slate-900/50 border-b border-white/5 relative z-30">
        <div class="flex-1">
            <h2 class="text-xs font-black uppercase"><span id="p1-name">You</span></h2>
            <p class="text-2xl font-black text-blue-400" id="p1-score">0</p>
        </div>
        
        <div class="flex-1 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Time</p>
            <h2 class="text-2xl font-black text-white"><span id="time-val">50</span>s</h2>
        </div>

        <div class="flex-1 text-right">
            <h2 class="text-xs font-black uppercase"><span id="p2-name">Opponent</span></h2>
            <p class="text-2xl font-black text-red-400" id="p2-score">0</p>
        </div>
    </header>

    <div id="game-container">
        <div id="grid" class="grid-layer"></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="status-msg" class="text-center mt-6 text-sm font-bold text-slate-400 uppercase tracking-widest animate-pulse">Waiting for players...</div>

    <div id="joystick-wrapper">
        <div id="joystick-stick"></div>
    </div>

    <script>
        // --- SUPABASE SETUP ---
        const SB_URL = 'https://ueuhuyzuacvwqpfszrzy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVldWh1eXp1YWN2d3FwZnN6cnp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjQzOTksImV4cCI6MjA5MDQwMDM5OX0.DCAPnXLo7sM576-KC4HzXT09uc6nn9u00gT1RYCIxUs';
        const flowClient = window.supabase.createClient(SB_URL, SB_KEY);

        const params = new URLSearchParams(window.location.search);
        const matchId = params.get('match') || 'food_bombs_arena';
        const hostId = params.get('host'); 
        const wager = parseInt(params.get('wager')) || 100; // Amount stacked
        
        let currentUser, myRole, gameChannel;
        
        let p1 = { x: 0, y: 0, score: 0, alive: true, name: 'You', angle: 0, walking: false, color: '#3b82f6' };
        let p2 = { x: 0, y: 0, score: 0, alive: true, name: 'Opponent', angle: 0, walking: false, color: '#ef4444' };
        
        let gameActive = false;
        let roundTime = 50; 
        let timerInterval;
        let tiles = [];
        let hostIsControllingGame = false;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        async function init() {
            const { data: { session } } = await flowClient.auth.getSession();
            currentUser = session ? session.user : { id: hostId || 'test_user_' + Math.random() }; 
            myRole = currentUser.id === hostId ? 'host' : 'guest';
            hostIsControllingGame = (myRole === 'host'); 

            if (myRole === 'host') {
                p1.color = '#3b82f6'; p2.color = '#ef4444';
                document.getElementById('joystick-stick').style.background = '#3b82f6';
            } else {
                p1.color = '#ef4444'; p2.color = '#3b82f6';
                document.getElementById('joystick-stick').style.background = '#ef4444';
                document.getElementById('p1-score').className = "text-2xl font-black text-red-400";
                document.getElementById('p2-score').className = "text-2xl font-black text-blue-400";
            }

            resize(); setupGrid(); resetPositions(); setupRealtime();
            
            let count = 3;
            const counterEl = document.getElementById('rules-countdown');
            const interval = setInterval(() => {
                count--;
                if(count > 0) {
                    counterEl.innerText = count;
                } else {
                    clearInterval(interval);
                    document.getElementById('rules-overlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('rules-overlay').style.display = 'none';
                        if(hostIsControllingGame) startRound();
                    }, 500);
                }
            }, 1000);
            
            requestAnimationFrame(render);
        }

        function setupGrid() {
            const gridEl = document.getElementById('grid'); gridEl.innerHTML = ''; tiles = [];
            for(let i=0; i<16; i++) {
                const el = document.createElement('div'); el.className = 'tile';
                gridEl.appendChild(el); tiles.push({ el, state: 'normal' });
            }
        }

        function resize() { canvas.width = container.offsetWidth; canvas.height = container.offsetHeight; }

        function resetPositions() {
            if (myRole === 'host') { p1.x = 40; p1.y = 40; p2.x = canvas.width - 40; p2.y = canvas.height - 40; } 
            else { p1.x = canvas.width - 40; p1.y = canvas.height - 40; p2.x = 40; p2.y = 40; }
            p1.alive = p2.alive = true;
        }

        // --- REALTIME CONNECTION ---
        function setupRealtime() {
            gameChannel = flowClient.channel(matchId);
            gameChannel
                .on('broadcast', { event: 'move' }, ({payload}) => {
                    if(payload.uid !== currentUser.id) { 
                        p2.x = payload.x; p2.y = payload.y; p2.angle = payload.angle; p2.walking = payload.walking;
                    }
                })
                .on('broadcast', { event: 'round_start' }, () => {
                    gameActive = true;
                    document.getElementById('status-msg').innerText = "EAT!";
                    document.getElementById('status-msg').classList.replace('text-slate-400', 'text-yellow-400');
                    startClientTimer();
                })
                .on('broadcast', { event: 'spawn' }, ({payload}) => { handleSpawn(payload); })
                .on('broadcast', { event: 'eat' }, ({payload}) => {
                    let tile = tiles[payload.idx];
                    if(tile) resetTile(tile);
                    if(payload.uid !== currentUser.id) { p2.score = payload.score; document.getElementById('p2-score').innerText = p2.score; }
                })
                .on('broadcast', { event: 'death' }, ({payload}) => {
                    if(payload.uid === currentUser.id) p1.alive = false; else p2.alive = false;
                    checkEndGame();
                })
                .subscribe();
        }

        function startClientTimer() {
            document.getElementById('time-val').innerText = roundTime;
            timerInterval = setInterval(() => {
                if(!gameActive) return clearInterval(timerInterval);
                roundTime--;
                document.getElementById('time-val').innerText = roundTime;
                if(roundTime <= 0) {
                    gameActive = false; clearInterval(timerInterval); checkEndGame(true);
                }
            }, 1000);
        }

        // --- GAME LOGIC (HOST DRIVEN SPAWNS) ---
        function startRound() {
            gameActive = true;
            gameChannel.send({type:'broadcast', event:'round_start'});
            startClientTimer();

            // Spawn Food every 1.5 seconds
            setInterval(() => {
                if(!gameActive) return;
                let idx = getRandomEmptyTile();
                if(idx !== null) {
                    gameChannel.send({type:'broadcast', event:'spawn', payload:{type:'food', idx}});
                    handleSpawn({type:'food', idx});
                }
            }, 1500);

            // Spawn Bombs every 2 seconds
            setInterval(() => {
                if(!gameActive) return;
                let idx = getRandomEmptyTile();
                if(idx !== null) {
                    let duration = 700 + Math.random() * 700; // Bombs last 2-4 seconds
                    gameChannel.send({type:'broadcast', event:'spawn', payload:{type:'bomb', idx, duration}});
                    handleSpawn({type:'bomb', idx, duration});
                }
            }, 4000);
        }

        function getRandomEmptyTile() {
            let empty = [];
            tiles.forEach((t, i) => { if(t.state === 'normal') empty.push(i); });
            if(empty.length === 0) return null;
            return empty[Math.floor(Math.random() * empty.length)];
        }

        function handleSpawn(data) {
            let tile = tiles[data.idx];
            if(!tile || tile.state !== 'normal') return;
            
            if(data.type === 'food') {
                tile.state = 'food';
                tile.el.innerHTML = '<i class="fa-solid fa-burger text-3xl text-yellow-400 drop-shadow-md"></i>';
                tile.el.classList.add('tile-food');
            } else if(data.type === 'bomb') {
                tile.state = 'bomb';
                tile.el.innerHTML = '<i class="fa-solid fa-bomb text-3xl text-red-500 animate-pulse drop-shadow-md"></i>';
                tile.el.classList.add('tile-bomb');
                
                setTimeout(() => { if(tile.state === 'bomb') resetTile(tile); }, data.duration);
            }
        }

        function resetTile(tile) {
            tile.state = 'normal';
            tile.el.innerHTML = '';
            tile.el.className = 'tile';
        }

        // --- MOVEMENT & COLLISION (CLIENT DRIVEN) ---
        let joystick = { active: false, x: 0, y: 0 };
        const stick = document.getElementById('joystick-stick');
        
        document.addEventListener('touchstart', e => { if(e.target.closest('#joystick-wrapper')) { joystick.active = true; p1.walking = true; } });
        document.addEventListener('touchmove', e => {
            if(!joystick.active) return;
            const wrap = document.getElementById('joystick-wrapper').getBoundingClientRect();
            const touch = e.touches[0];
            let dx = touch.clientX - (wrap.left + 60), dy = touch.clientY - (wrap.top + 60);
            p1.angle = Math.atan2(dy, dx);
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 40) { dx *= 40/dist; dy *= 40/dist; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            joystick.x = dx / 40; joystick.y = dy / 40;
        });
        document.addEventListener('touchend', () => { joystick.active = false; p1.walking = false; stick.style.transform = `translate(0,0)`; joystick.x = 0; joystick.y = 0; });

        function updateMovement() {
            if(!p1.alive || !gameActive) { p1.walking = false; return; }

            if (joystick.active) {
                let nextX = p1.x + (joystick.x * 3.5); // Speed
                let nextY = p1.y + (joystick.y * 3.5);

                // Check bounds
                if (nextX <= 15 || nextX >= canvas.width - 15) nextX = p1.x;
                if (nextY <= 15 || nextY >= canvas.height - 15) nextY = p1.y;

                // Player Collision Detection (Bodyblocking)
                if(p2.alive) {
                    let dxCollide = nextX - p2.x;
                    let dyCollide = nextY - p2.y;
                    let distCollide = Math.sqrt(dxCollide * dxCollide + dyCollide * dyCollide);
                    
                    // Radius is roughly 11, so 22 is minimum distance. Using 24 for a slight cushion.
                    if (distCollide < 24) { 
                        nextX = p1.x;
                        nextY = p1.y;
                    }
                }

                p1.x = nextX;
                p1.y = nextY;
            }

            // Tile Interaction
            let tileW = canvas.width / 4; let tileH = canvas.height / 4;
            let myIdx = Math.floor(p1.y / tileH) * 4 + Math.floor(p1.x / tileW);
            let currentTile = tiles[myIdx];

            if(currentTile) {
                if(currentTile.state === 'food') {
                    resetTile(currentTile);
                    p1.score++;
                    document.getElementById('p1-score').innerText = p1.score;
                    gameChannel.send({type:'broadcast', event:'eat', payload:{idx: myIdx, uid: currentUser.id, score: p1.score}});
                } else if(currentTile.state === 'bomb' && p1.alive) {
                    p1.alive = false;
                    gameChannel.send({type:'broadcast', event:'death', payload:{uid: currentUser.id}});
                    checkEndGame();
                }
            }

            gameChannel.send({ type: 'broadcast', event: 'move', payload: { uid: currentUser.id, x: p1.x, y: p1.y, angle: p1.angle, walking: p1.walking } });
        }

        // --- ENDGAME ---
        async function checkEndGame(timeUp = false) {
            if(!gameActive && !timeUp) return; // Prevent double firing
            gameActive = false; joystick.active = false; stick.style.transform = `translate(0,0)`; p1.walking = false;

            let result = 'tie';

            // Determine Winner
            if(!p1.alive && p2.alive) { result = 'lose'; }
            else if(p1.alive && !p2.alive) { result = 'win'; }
            else if(!p1.alive && !p2.alive) { result = 'tie'; }
            else {
                if(p1.score > p2.score) { result = 'win'; }
                else if(p1.score < p2.score) { result = 'lose'; }
                else { result = 'tie'; }
            }

            // Distribute Rewards & Alert
            if(result === 'win') {
                const winnings = Math.floor(wager * 1.8);
                
                // Update coins in DB if real user
                if(currentUser.id && !currentUser.id.startsWith('test_')) {
                    try {
                        const { data } = await flowClient.from('profiles').select('coins').eq('id', currentUser.id).single();
                        if (data) {
                            await flowClient.from('profiles').update({ coins: data.coins + winnings }).eq('id', currentUser.id);
                        }
                    } catch(e) { console.error("Could not update coins:", e); }
                }

                Swal.fire({ 
                    title: "YOU WIN!", 
                    text: `You outplayed your opponent and won ${winnings} coins!`, 
                    icon: "success", 
                    background: '#0f172a', color: '#fff', confirmButtonColor: '#3b82f6', confirmButtonText: 'Home' 
                }).then(() => window.location.replace('index.html'));

            } else if(result === 'lose') {
                Swal.fire({ 
                    title: "YOU LOST!", 
                    text: "Your opponent claimed the victory. Better luck next time.", 
                    icon: "error", 
                    background: '#0f172a', color: '#fff', confirmButtonColor: '#ef4444', confirmButtonText: 'Home' 
                }).then(() => window.location.replace('index.html'));

            } else {
                Swal.fire({ 
                    title: "TIE GAME!", 
                    text: "You both tied. No one wins the pot.", 
                    icon: "info", 
                    background: '#0f172a', color: '#fff', confirmButtonColor: '#64748b', confirmButtonText: 'Home' 
                }).then(() => window.location.replace('index.html'));
            }
        }

        // --- RENDER ---
        function drawPlayer(x, y, angle, isWalking, isAlive, color) {
            ctx.save(); ctx.translate(x, y);
            if (!isAlive) { ctx.font = '24px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText("💥", 0, 0); ctx.restore(); return; }
            ctx.rotate(angle);
            let swing = isWalking ? Math.sin(Date.now() / 80) * 10 : 0; 
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(swing, -12, 5, 0, Math.PI*2); ctx.fill(); 
            ctx.beginPath(); ctx.arc(-swing, 12, 5, 0, Math.PI*2); ctx.fill(); 
            ctx.shadowBlur = 10; ctx.shadowColor = color;
            ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0; ctx.fillStyle = '#fca5a5'; 
            ctx.beginPath(); ctx.arc(4, 0, 6, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateMovement();
            drawPlayer(p2.x, p2.y, p2.angle, p2.walking, p2.alive, p2.color);
            drawPlayer(p1.x, p1.y, p1.angle, p1.walking, p1.alive, p1.color);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', resize);
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
