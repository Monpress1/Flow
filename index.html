<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow | Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background: #020617; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* --- 3D Water Ripple Preloader --- */
        #preloader {
            position: fixed; inset: 0; background: #020617; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out; perspective: 1000px;
        }
        .droplet {
            width: 12px; height: 12px; background: #3b82f6; border-radius: 50%;
            position: absolute; top: -20px;
            animation: dropIn 0.6s cubic-bezier(0.5, 0, 1, 1) forwards;
        }
        .ripple-ring {
            position: absolute; border-radius: 50%;
            border: 2px solid rgba(59, 130, 246, 0.5);
            opacity: 0; transform: rotateX(70deg);
        }
        .ripple-1 { animation: rippleFluid 2.4s ease-out 0.6s forwards; }
        
        @keyframes dropIn { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(50vh); opacity: 0; } }
        @keyframes rippleFluid { 
            0% { width: 0; height: 0; opacity: 1; border-width: 4px; } 
            100% { width: 500px; height: 500px; opacity: 0; border-width: 1px; } 
        }

        /* --- Featured Slider --- */
        .gliding-container { width: 100%; overflow-x: auto; scrollbar-width: none; cursor: grab; }
        .gliding-container::-webkit-scrollbar { display: none; }
        .gliding-track { display: flex; gap: 1rem; width: max-content; padding: 0.5rem 0; }

        .featured-card {
            width: 280px; height: 160px; border-radius: 1.5rem;
            background-size: cover; background-position: center;
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .featured-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
            display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem;
        }

        .game-card {
            background-color: rgba(30, 41, 59, 0.5); background-size: cover; background-position: center;
            border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; overflow: hidden;
            transition: transform 0.2s; position: relative; cursor: pointer;
        }
        .game-card:active { transform: scale(0.95); }

        .nav-dock { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); }
        .center-game-btn { background: linear-gradient(135deg, #06b6d4, #3b82f6); transform: translateY(-25px); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); }

        /* --- Challenge Popup --- */
        .challenge-alert {
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.4);
            position: fixed; top: 0; left: 50%; z-index: 10000; width: 92%;
            transform: translate(-50%, -150%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 1.5rem;
        }
        .challenge-alert.active { transform: translate(-50%, 20px); }
    </style>
</head>
<body class="max-w-md mx-auto">

    <div id="preloader">
        <div class="droplet"></div>
        <div class="ripple-ring ripple-1"></div>
    </div>

    <div id="global-challenge-popup" class="challenge-alert p-4 shadow-2xl">
        <div class="flex items-center gap-4">
            <img id="popup-challenger-img" src="" class="w-14 h-14 rounded-full border-2 border-blue-500 object-cover bg-slate-800">
            <div class="flex-1">
                <h3 class="font-bold text-white text-sm leading-tight">
                    <span id="popup-challenger-name" class="text-blue-400">Player</span> challenged you to <span id="popup-game-name" class="text-yellow-400">Battle</span>
                </h3>
                <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest mt-1">Accept in 10s</p>
            </div>
            <div class="flex flex-col gap-2">
                <button id="btn-accept-challenge" class="w-10 h-10 rounded-full bg-green-500 text-white flex items-center justify-center active:scale-90 transition">
                    <i class="fa-solid fa-check"></i>
                </button>
                <button id="btn-decline-challenge" class="w-10 h-10 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 flex items-center justify-center active:scale-90 transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>
        <div class="w-full h-1 bg-slate-900 mt-4 rounded-full overflow-hidden">
            <div id="popup-timer-bar" class="h-full bg-gradient-to-r from-blue-500 to-cyan-400 w-full"></div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 w-[90%] pointer-events-none"></div>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-md z-40">
        <a href="account.html" class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="h-10">
            <div>
                <p class="text-[10px] text-slate-400 uppercase tracking-wider">Welcome,</p>
                <h2 id="user-greeting" class="font-bold text-sm leading-none">Player</h2>
            </div>
        </a>
        <div class="flex items-center gap-3 bg-slate-900 px-4 py-2 rounded-full border border-slate-700">
            <i class="fa-solid fa-coins text-yellow-400"></i>
            <span id="balance" class="font-bold text-sm">0.00</span>
            <a href="wallet.html" class="bg-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-xs font-black">+</a>
        </div>
    </header>

    <main class="px-5 space-y-8 mt-2">
        <section>
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-fire text-orange-500"></i> Featured
            </h2>
            <div class="gliding-container" id="slider">
                <div class="gliding-track" id="slider-track">
                    <div class="featured-card" style="background-image: url('f1.jpg');">
                        <div class="featured-overlay">
                            <h3 class="text-xl font-black">CRASH</h3>
                            <button onclick="playGame('crash')" class="bg-white/20 px-4 py-1.5 rounded-lg text-xs font-bold border border-white/10 mt-2">PLAY</button>
                        </div>
                    </div>
                    <div class="featured-card" style="background-image: url('f2.jpg');">
                        <div class="featured-overlay">
                            <h3 class="text-xl font-black">TILES</h3>
                            <button onclick="playGame('tiles')" class="bg-white/20 px-4 py-1.5 rounded-lg text-xs font-bold border border-white/10 mt-2">PLAY</button>
                        </div>
                    </div>
                    <div class="featured-card" style="background-image: url('p2.jpg');">
                        <div class="featured-overlay">
                            <h3 class="text-xl font-black">MINES</h3>
                            <button onclick="playGame('mines')" class="bg-white/20 px-4 py-1.5 rounded-lg text-xs font-bold border border-white/10 mt-2">PLAY</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4">Popular</h2>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="playGame('dice')" class="game-card h-32" style="background-image: url('p1.jpg');">
                    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 w-10/12 bg-black/40 backdrop-blur-md border border-white/10 py-1.5 rounded-full text-center text-xs font-bold">Dice Roll</div>
                </div>
                <div onclick="playGame('mines')" class="game-card h-32" style="background-image: url('p2.jpg');">
                    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 w-10/12 bg-black/40 backdrop-blur-md border border-white/10 py-1.5 rounded-full text-center text-xs font-bold">Mines</div>
                </div>
                <div onclick="playGame('coinflip')" class="game-card h-32" style="background-image: url('p3.png');">
                    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 w-10/12 bg-black/40 backdrop-blur-md border border-white/10 py-1.5 rounded-full text-center text-xs font-bold">Coin Flip</div>
                </div>
                <div onclick="playGame('towers')" class="game-card h-32" style="background-image: url('p4.jpg');">
                    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 w-10/12 bg-black/40 backdrop-blur-md border border-white/10 py-1.5 rounded-full text-center text-xs font-bold">Towers</div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4">Casual</h2>
            <div class="grid grid-cols-3 gap-3">
                <div onclick="playGame('tap')" class="game-card h-28" style="background-image: url('c1.jpg');">
                    <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[90%] bg-black/40 backdrop-blur-md py-1 rounded-full text-center text-[10px] font-bold">Tap Tap</div>
                </div>
                <div onclick="playGame('race')" class="game-card h-28" style="background-image: url('c2.jpg');">
                    <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[90%] bg-black/40 backdrop-blur-md py-1 rounded-full text-center text-[10px] font-bold">Car Race</div>
                </div>
                <div onclick="playGame('mole')" class="game-card h-28" style="background-image: url('c3.png');">
                    <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[90%] bg-black/40 backdrop-blur-md py-1 rounded-full text-center text-[10px] font-bold">Mole</div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left text-slate-400"></i> History</h2>
                <a href="activity.html" class="text-xs text-blue-400 font-bold px-2 py-1 bg-blue-500/10 rounded">View All</a>
            </div>
            <div id="history-container" class="space-y-3"></div>
        </section>
    </main>

    <nav class="nav-dock fixed bottom-0 w-full max-w-md flex justify-between items-center px-6 py-4 z-50">
        <a href="index.html" class="text-blue-500 flex flex-col items-center gap-1"><i class="fa-solid fa-house"></i><span class="text-[10px]">Home</span></a>
        <a href="chat.html" class="text-slate-500 flex flex-col items-center gap-1"><i class="fa-solid fa-message"></i><span class="text-[10px]">Chat</span></a>
        <a href="lobby.html" class="center-game-btn w-16 h-16 rounded-full flex items-center justify-center text-white text-2xl border-4 border-[#020617]"><i class="fa-solid fa-gem"></i></a>
        <a href="wallet.html" class="text-slate-500 flex flex-col items-center gap-1"><i class="fa-solid fa-wallet"></i><span class="text-[10px]">Wallet</span></a>
        <a href="account.html" class="text-slate-500 flex flex-col items-center gap-1"><i class="fa-solid fa-user"></i><span class="text-[10px]">Account</span></a>
    </nav>

    <script>
        const SB_URL = 'https://ueuhuyzuacvwqpfszrzy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVldWh1eXp1YWN2d3FwZnN6cnp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjQzOTksImV4cCI6MjA5MDQwMDM5OX0.DCAPnXLo7sM576-KC4HzXT09uc6nn9u00gT1RYCIxUs';
        const flowClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let profileData = null;

        async function init() {
            const { data: { session } } = await flowClient.auth.getSession();
            if (!session) return window.location.replace('auth.html');
            currentUser = session.user;
            
            document.getElementById('user-greeting').innerText = currentUser.user_metadata.username || currentUser.user_metadata.first_name || 'Player';
            
            initGlobalChallenges(flowClient, currentUser, 'Home');
            fetchTableData();
            fetchHistory();
            startAutoScroll();
            
            setTimeout(() => {
                const loader = document.getElementById('preloader');
                if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 800); }
            }, 1800);
        }

        async function fetchTableData() {
            const { data } = await flowClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if (data) {
                profileData = data;
                document.getElementById('balance').innerText = parseFloat(data.coins).toLocaleString(undefined, {minimumFractionDigits: 2});
            } else if (currentUser.user_metadata.coins) {
                document.getElementById('balance').innerText = parseFloat(currentUser.user_metadata.coins).toLocaleString(undefined, {minimumFractionDigits: 2});
            }
        }

        function playGame(gameId) {
            window.location.href = `lobby.html?game=${gameId}`;
        }

        async function initGlobalChallenges(supabaseClient, user, currentPageName) {
            const runHeartbeat = async () => {
                await supabaseClient.from('profiles').update({ last_seen: new Date().toISOString(), current_location: currentPageName }).eq('id', user.id);
            };
            runHeartbeat();
            setInterval(runHeartbeat, 30000);

            const globalChannel = supabaseClient.channel('global_alerts');
            globalChannel
                .on('broadcast', { event: 'incoming_challenge' }, ({ payload }) => {
                    if (payload.targetId === user.id) showChallengePopup(payload);
                })
                .on('broadcast', { event: 'challenge_response' }, ({ payload }) => {
                    if (payload.challengerId === user.id && payload.accepted) {
                        window.location.href = `lobby.html?match=${payload.matchId}&opp=${payload.targetId}&role=host`;
                    }
                })
                .subscribe();

            window.globalAlertChannel = globalChannel;

            const handleResponse = async (accepted) => {
                if (!window.currentChallenge) return;
                clearTimeout(window.challengeTimeout);
                document.getElementById('global-challenge-popup').classList.remove('active');

                await globalChannel.send({
                    type: 'broadcast',
                    event: 'challenge_response',
                    payload: { challengerId: window.currentChallenge.challengerId, targetId: user.id, accepted: accepted, matchId: window.currentChallenge.matchId }
                });

                if (accepted) {
                    window.location.href = `lobby.html?match=${window.currentChallenge.matchId}&opp=${window.currentChallenge.challengerId}&role=guest`;
                }
                window.currentChallenge = null;
            };

            document.getElementById('btn-accept-challenge').onclick = () => handleResponse(true);
            document.getElementById('btn-decline-challenge').onclick = () => handleResponse(false);
        }

        function showChallengePopup(payload) {
            window.currentChallenge = payload;
            const popup = document.getElementById('global-challenge-popup');
            const bar = document.getElementById('popup-timer-bar');
            
            document.getElementById('popup-challenger-name').innerText = payload.challengerName;
            document.getElementById('popup-game-name').innerText = payload.game || "a Match";
            document.getElementById('popup-challenger-img').src = payload.challengerAvatar || 'logo.png';
            
            bar.style.transition = 'none';
            bar.style.width = '100%';
            popup.classList.add('active');
            
            setTimeout(() => {
                bar.style.transition = 'width 10s linear';
                bar.style.width = '0%';
            }, 50);

            window.challengeTimeout = setTimeout(() => {
                popup.classList.remove('active');
                window.currentChallenge = null;
            }, 10000);
        }

        function startAutoScroll() {
            const slider = document.getElementById('slider');
            if(!slider) return;
            const autoSlide = setInterval(() => {
                slider.scrollLeft += 1;
                if (slider.scrollLeft >= (slider.scrollWidth - slider.clientWidth) - 2) slider.scrollLeft = 0;
            }, 30);
            slider.addEventListener('touchstart', () => clearInterval(autoSlide));
            slider.addEventListener('mousedown', () => clearInterval(autoSlide));
        }

        async function fetchHistory() {
            const container = document.getElementById('history-container');
            const { data } = await flowClient.from('user_activity').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(3);
            
            if (data && data.length > 0) {
                container.innerHTML = data.map(item => `
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid ${item.type === 'win' ? 'fa-trophy text-yellow-400' : 'fa-skull text-red-400'}"></i>
                            <p class="text-sm font-bold">${item.title}</p>
                        </div>
                        <span class="font-bold text-sm ${item.amount > 0 ? 'text-green-400' : 'text-red-400'}">${item.amount > 0 ? '+' : ''}${item.amount}</span>
                    </div>`).join('');
            } else {
                container.innerHTML = '<p class="text-center text-slate-500 text-xs py-4">No recent activity.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
